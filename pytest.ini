[pytest]
# ─────────────────────────────────────────────────────────────────────────────
# Testinfra / pytest configuration for IPA certificate workflow tests
# ─────────────────────────────────────────────────────────────────────────────

addopts =
    -v
    --tb=short
    --connection=ssh

testpaths = tests

markers =
    csr:        CSR and private key generation checks on cert hosts
    signed:     IPA-signed certificate checks on cert hosts
    ipaclient:  IPAclient installation and enrollment checks
    copy:       CSR/CRT copy-step and file-transfer checks
    security:   Security boundary assertions (key isolation etc.)

# ─────────────────────────────────────────────────────────────────────────────
# All path/infra options are passed on the CLI, not here.
# See README.md for usage examples.
# ─────────────────────────────────────────────────────────────────────────────
